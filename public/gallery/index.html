<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gallery - thedevbones crypt</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link href="/css/style.css" rel="stylesheet" type="text/css">
    <style>
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .gallery-item {
        position: relative;
        cursor: pointer;
        overflow: hidden;
        aspect-ratio: 1 / 1;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .gallery-caption {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 0.3s ease;
        padding: 16px;
        box-sizing: border-box;
      }

      .gallery-item:hover .gallery-caption {
        opacity: 1;
      }

      .gallery-caption p {
        color: white;
        font-size: 14px;
      }

      /* Play button icon on video thumbnails */
      .play-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        background: rgba(0, 0, 0, 0.7);
        border-radius: 50%;
        pointer-events: none;
      }

      .play-icon::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 55%;
        transform: translate(-50%, -50%);
        border-style: solid;
        border-width: 10px 0 10px 18px;
        border-color: transparent transparent transparent white;
      }

      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 999;
        cursor: pointer;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
      }

      .lightbox.active {
        display: flex;
      }

      .lightbox img {
        max-width: 90%;
        max-height: 80%;
        object-fit: contain;
      }

      .lightbox iframe {
        width: 90%;
        max-width: 800px;
        aspect-ratio: 16 / 9;
        border: none;
      }

      .lightbox-caption {
        color: white;
        font-size: 16px;
        text-align: center;
        max-width: 80%;
      }

      @media (max-width: 768px) {
        .gallery-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="lightbox" id="lightbox">
      <img id="lightbox-img" src="" alt="">
      <iframe id="lightbox-video" src="" allowfullscreen></iframe>
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>

    <div class="content">
      <div class="title-container">
        <img src="/images/aniskull130.gif" alt="Skull">
        <img src="/images/gallery.png" alt="Gallery" class="title">
        <img src="/images/aniskull130.gif" alt="Skull">
      </div>

      <div class="section">
        <div class="gallery-grid" id="gallery"></div>
      </div>

      <div class="section">
        <a href="/" class="back-button"><img src="/images/back.png" alt="Back"></a>
      </div>

      <div id="footer"></div>
    </div>

    <script>
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightbox-img');
      var lightboxVideo = document.getElementById('lightbox-video');
      var lightboxCaption = document.getElementById('lightbox-caption');

      function openImageLightbox(src, caption) {
        lightboxImg.src = src;
        lightboxImg.style.display = 'block';
        lightboxVideo.style.display = 'none';
        lightboxVideo.src = '';
        lightboxCaption.textContent = caption || '';
        lightboxCaption.style.display = caption ? 'block' : 'none';
        lightbox.classList.add('active');
      }

      function openVideoLightbox(videoId, caption) {
        lightboxVideo.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1';
        lightboxVideo.style.display = 'block';
        lightboxImg.style.display = 'none';
        lightboxImg.src = '';
        lightboxCaption.textContent = caption || '';
        lightboxCaption.style.display = caption ? 'block' : 'none';
        lightbox.classList.add('active');
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        lightboxVideo.src = '';
        lightboxImg.src = '';
      }

      lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox || e.target === lightboxImg || e.target === lightboxCaption) {
          closeLightbox();
        }
      });

      function createImageItem(filename, caption) {
        var item = document.createElement('div');
        item.className = 'gallery-item';

        var src = 'media/' + filename;
        var img = document.createElement('img');
        img.src = src;
        img.alt = caption || filename;
        img.loading = 'lazy';
        item.appendChild(img);

        item.addEventListener('click', function() {
          openImageLightbox(src, caption);
        });

        if (caption) {
          var overlay = document.createElement('div');
          overlay.className = 'gallery-caption';
          var text = document.createElement('p');
          text.textContent = caption;
          overlay.appendChild(text);
          item.appendChild(overlay);
        }

        return item;
      }

      function createVideoItem(videoId, caption) {
        var item = document.createElement('div');
        item.className = 'gallery-item';

        var img = document.createElement('img');
        img.src = 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
        img.alt = caption || 'Video';
        img.loading = 'lazy';
        item.appendChild(img);

        var playIcon = document.createElement('div');
        playIcon.className = 'play-icon';
        item.appendChild(playIcon);

        item.addEventListener('click', function() {
          openVideoLightbox(videoId, caption);
        });

        if (caption) {
          var overlay = document.createElement('div');
          overlay.className = 'gallery-caption';
          var text = document.createElement('p');
          text.textContent = caption;
          overlay.appendChild(text);
          item.appendChild(overlay);
        }

        return item;
      }

      Promise.all([
        fetch('manifest.json').then(function(r) { return r.json(); }),
        fetch('captions.json').then(function(r) { return r.json(); }).catch(function() { return {}; }),
        fetch('videos.json').then(function(r) { return r.json(); }).catch(function() { return []; })
      ]).then(function(results) {
        var files = results[0];
        var captions = results[1];
        var videos = results[2];
        var gallery = document.getElementById('gallery');

        videos.forEach(function(video) {
          gallery.appendChild(createVideoItem(video.id, video.caption));
        });

        files.forEach(function(filename) {
          gallery.appendChild(createImageItem(filename, captions[filename]));
        });
      });
    </script>

    <script>
      fetch('/footer.html')
        .then(response => response.text())
        .then(data => document.getElementById('footer').innerHTML = data)
        .catch(console.error);
    </script>
  </body>
</html>
